<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味登录页</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <!-- 左侧插画：使用 Rive 动画替换原有 SVG -->
        <div class="illustration-section">
            <canvas id="riveCanvas" width="900" height="800"></canvas>
        </div>

        <!-- 右侧表单 -->
        <div class="form-section">
            <div class="form-wrapper">
                <div class="header-group">
                    <!-- 装饰图案：替换为 logo.svg -->
                    <div class="decorations">
                        <img src="svg/logo.svg" alt="Logo" class="logo-icon">
                    </div>
                    <!-- Title using the welcome back.svg -->
                    <img src="svg/welcome back.svg" alt="Welcome back!" class="welcome-title">
                    <p class="subtitle">Please enter your details</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label for="email" class="floating-label">Email</label>
                    </div>

                    <div class="input-group" id="passwordGroup">
                        <input type="password" id="password" placeholder=" " required>
                        <label for="password" class="floating-label">Password</label>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <canvas id="eyeCanvas" width="24" height="24" class="eye-icon"></canvas>
                        </button>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            <span class="checkbox-custom"></span>
                            Remember for 30 days
                        </label>
                        <a href="#" class="forgot-link">Forget password？</a>
                    </div>

                    <button type="submit" class="btn-primary">Loin In</button>
                    
                    <button type="button" class="btn-secondary">
                        <svg class="google-icon" width="24" height="24" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Loin in with Google
                    </button>
                </form>

                <div class="signup-prompt">
                    Don't have an account？<a href="#">Sign Up</a>
                </div>
            </div>
        </div>
    </div>
    <!-- 改为相对路径以适应 vite 部署 -->
    <script type="module" src="./script.js"></script>
</body>
</html>
